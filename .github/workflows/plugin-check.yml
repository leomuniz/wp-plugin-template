name: Plugin Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: PCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './'
          exclude-directories: 'node_modules,.git,.github,.claude,tests,docs'
          categories: |
            plugin_repo
            general
            security
            performance
