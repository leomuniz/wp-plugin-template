name: Plugin Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: PCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: |
          composer install --no-interaction
          npm ci

      - name: Build production zip
        run: ./build-zip.sh

      - name: Extract zip for checking
        run: |
          PLUGIN_SLUG=$(basename dist/*.zip .zip | sed 's/-[0-9].*//')
          mkdir -p /tmp/plugin-check
          unzip -q dist/*.zip -d /tmp/plugin-check/
          echo "PLUGIN_DIR=/tmp/plugin-check/${PLUGIN_SLUG}" >> "$GITHUB_ENV"

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ${{ env.PLUGIN_DIR }}
          categories: |
            plugin_repo
            general
            security
            performance
